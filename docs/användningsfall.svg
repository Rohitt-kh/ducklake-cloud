<svg width="900" height="620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="620" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#20232a">Vad kan man göra med DuckLake?</text>

  <!-- ── CENTER: DuckLake ── -->
  <rect x="355" y="240" width="190" height="100" rx="14" fill="white" stroke="#28a745" stroke-width="3"/>
  <text x="450" y="278" text-anchor="middle" font-size="15" font-weight="bold" fill="#28a745">🦆 DuckLake</text>
  <text x="450" y="298" text-anchor="middle" font-size="10" fill="#555">PostgreSQL + MinIO</text>
  <text x="450" y="313" text-anchor="middle" font-size="10" fill="#555">Parquet-filer</text>
  <text x="450" y="328" text-anchor="middle" font-size="10" fill="#888">Ditt datalager</text>

  <!-- ── 1: REST API (top left) ── -->
  <rect x="30" y="55" width="180" height="100" rx="10" fill="white" stroke="#0d6efd" stroke-width="2"/>
  <rect x="30" y="55" width="180" height="32" rx="10" fill="#0d6efd"/>
  <rect x="30" y="75" width="180" height="12" fill="#0d6efd"/>
  <text x="120" y="74" text-anchor="middle" font-size="12" font-weight="bold" fill="white">① REST API</text>
  <text x="120" y="107" text-anchor="middle" font-size="10" fill="#333">Exponera data via HTTP</text>
  <text x="120" y="122" text-anchor="middle" font-size="10" fill="#333">GET/POST/DELETE</text>
  <text x="120" y="137" text-anchor="middle" font-size="10" fill="#888">Python, Java, Node.js...</text>
  <!-- Arrow -->
  <line x1="210" y1="105" x2="355" y2="265" stroke="#0d6efd" stroke-width="1.5" stroke-dasharray="5" marker-end="url(#ab)"/>

  <!-- ── 2: Dataanalys (top center) ── -->
  <rect x="355" y="55" width="190" height="100" rx="10" fill="white" stroke="#6f42c1" stroke-width="2"/>
  <rect x="355" y="55" width="190" height="32" rx="10" fill="#6f42c1"/>
  <rect x="355" y="75" width="190" height="12" fill="#6f42c1"/>
  <text x="450" y="74" text-anchor="middle" font-size="12" font-weight="bold" fill="white">② Dataanalys</text>
  <text x="450" y="107" text-anchor="middle" font-size="10" fill="#333">Kör SQL-queries direkt</text>
  <text x="450" y="122" text-anchor="middle" font-size="10" fill="#6f42c1">SELECT AVG(pris) FROM lake.produkter</text>
  <text x="450" y="137" text-anchor="middle" font-size="10" fill="#888">DuckDB, Python, Jupyter</text>
  <!-- Arrow -->
  <line x1="450" y1="155" x2="450" y2="240" stroke="#6f42c1" stroke-width="1.5" stroke-dasharray="5" marker-end="url(#av)"/>

  <!-- ── 3: Machine Learning (top right) ── -->
  <rect x="690" y="55" width="180" height="100" rx="10" fill="white" stroke="#fd7e14" stroke-width="2"/>
  <rect x="690" y="55" width="180" height="32" rx="10" fill="#fd7e14"/>
  <rect x="690" y="75" width="180" height="12" fill="#fd7e14"/>
  <text x="780" y="74" text-anchor="middle" font-size="12" font-weight="bold" fill="white">③ Machine Learning</text>
  <text x="780" y="107" text-anchor="middle" font-size="10" fill="#333">Hämta träningsdata</text>
  <text x="780" y="122" text-anchor="middle" font-size="10" fill="#333">Spara modellresultat</text>
  <text x="780" y="137" text-anchor="middle" font-size="10" fill="#888">Pandas, scikit-learn</text>
  <!-- Arrow -->
  <line x1="690" y1="105" x2="545" y2="265" stroke="#fd7e14" stroke-width="1.5" stroke-dasharray="5" marker-end="url(#ao)"/>

  <!-- ── 4: Time Travel (left) ── -->
  <rect x="30" y="265" width="180" height="100" rx="10" fill="white" stroke="#17a2b8" stroke-width="2"/>
  <rect x="30" y="265" width="180" height="32" rx="10" fill="#17a2b8"/>
  <rect x="30" y="285" width="180" height="12" fill="#17a2b8"/>
  <text x="120" y="284" text-anchor="middle" font-size="12" font-weight="bold" fill="white">④ Time Travel</text>
  <text x="120" y="317" text-anchor="middle" font-size="10" fill="#333">Läs historiska versioner</text>
  <text x="120" y="332" text-anchor="middle" font-size="10" fill="#17a2b8">AT (VERSION => 5)</text>
  <text x="120" y="347" text-anchor="middle" font-size="10" fill="#888">Återställ raderad data</text>
  <!-- Arrow -->
  <line x1="210" y1="315" x2="355" y2="295" stroke="#17a2b8" stroke-width="1.5" stroke-dasharray="5" marker-end="url(#ac)"/>

  <!-- ── 5: Export (right) ── -->
  <rect x="690" y="265" width="180" height="100" rx="10" fill="white" stroke="#dc3545" stroke-width="2"/>
  <rect x="690" y="265" width="180" height="32" rx="10" fill="#dc3545"/>
  <rect x="690" y="285" width="180" height="12" fill="#dc3545"/>
  <text x="780" y="284" text-anchor="middle" font-size="12" font-weight="bold" fill="white">⑤ Export</text>
  <text x="780" y="317" text-anchor="middle" font-size="10" fill="#333">Exportera till CSV/Parquet</text>
  <text x="780" y="332" text-anchor="middle" font-size="10" fill="#333">Dela med andra verktyg</text>
  <text x="780" y="347" text-anchor="middle" font-size="10" fill="#888">Excel, Spark, Tableau</text>
  <!-- Arrow -->
  <line x1="690" y1="315" x2="545" y2="315" stroke="#dc3545" stroke-width="1.5" stroke-dasharray="5" marker-end="url(#ar)"/>

  <!-- ── 6: Visualisering (bottom left) ── -->
  <rect x="30" y="465" width="180" height="100" rx="10" fill="white" stroke="#ffc107" stroke-width="2"/>
  <rect x="30" y="465" width="180" height="32" rx="10" fill="#ffc107"/>
  <rect x="30" y="485" width="180" height="12" fill="#ffc107"/>
  <text x="120" y="484" text-anchor="middle" font-size="12" font-weight="bold" fill="white">⑥ Visualisering</text>
  <text x="120" y="517" text-anchor="middle" font-size="10" fill="#333">Koppla BI-verktyg</text>
  <text x="120" y="532" text-anchor="middle" font-size="10" fill="#333">Bygg dashboards</text>
  <text x="120" y="547" text-anchor="middle" font-size="10" fill="#888">Grafana, Metabase</text>
  <!-- Arrow -->
  <line x1="210" y1="505" x2="355" y2="370" stroke="#ffc107" stroke-width="1.5" stroke-dasharray="5" marker-end="url(#ay)"/>

  <!-- ── 7: Datapipeline (bottom center) ── -->
  <rect x="355" y="465" width="190" height="100" rx="10" fill="white" stroke="#20c997" stroke-width="2"/>
  <rect x="355" y="465" width="190" height="32" rx="10" fill="#20c997"/>
  <rect x="355" y="485" width="190" height="12" fill="#20c997"/>
  <text x="450" y="484" text-anchor="middle" font-size="12" font-weight="bold" fill="white">⑦ Datapipeline</text>
  <text x="450" y="517" text-anchor="middle" font-size="10" fill="#333">Importera från CSV/API</text>
  <text x="450" y="532" text-anchor="middle" font-size="10" fill="#333">Transformera och rensa</text>
  <text x="450" y="547" text-anchor="middle" font-size="10" fill="#888">ETL, automatisering</text>
  <!-- Arrow -->
  <line x1="450" y1="465" x2="450" y2="340" stroke="#20c997" stroke-width="1.5" stroke-dasharray="5" marker-end="url(#ag)"/>

  <!-- ── 8: Delning (bottom right) ── -->
  <rect x="690" y="465" width="180" height="100" rx="10" fill="white" stroke="#6c757d" stroke-width="2"/>
  <rect x="690" y="465" width="180" height="32" rx="10" fill="#6c757d"/>
  <rect x="690" y="485" width="180" height="12" fill="#6c757d"/>
  <text x="780" y="484" text-anchor="middle" font-size="12" font-weight="bold" fill="white">⑧ Datadelning</text>
  <text x="780" y="517" text-anchor="middle" font-size="10" fill="#333">Dela dataset med andra</text>
  <text x="780" y="532" text-anchor="middle" font-size="10" fill="#333">Öppet Parquet-format</text>
  <text x="780" y="547" text-anchor="middle" font-size="10" fill="#888">Python, Java, R, Spark</text>
  <!-- Arrow -->
  <line x1="690" y1="505" x2="545" y2="370" stroke="#6c757d" stroke-width="1.5" stroke-dasharray="5" marker-end="url(#as)"/>

  <!-- Bottom note -->
  <rect x="30" y="585" width="840" height="25" rx="6" fill="white" stroke="#dee2e6" stroke-width="1"/>
  <text x="450" y="602" text-anchor="middle" font-size="11" fill="#555">DuckLake är ett datalager — API:er är bara ett av många sätt att använda datan</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="ab" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#0d6efd"/></marker>
    <marker id="av" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#6f42c1"/></marker>
    <marker id="ao" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#fd7e14"/></marker>
    <marker id="ac" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#17a2b8"/></marker>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#dc3545"/></marker>
    <marker id="ay" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#ffc107"/></marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#20c997"/></marker>
    <marker id="as" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#6c757d"/></marker>
  </defs>

</svg>
